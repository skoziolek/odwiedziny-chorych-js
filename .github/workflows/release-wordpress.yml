# Tworzy lub aktualizuje GitHub Release dla wtyczki WordPress (tag v1.2.2) z załączonym ZIP-em.
# Uruchomienie: GitHub → Actions → „Release WordPress plugin” → Run workflow
name: Release WordPress plugin

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          VERSION="1.2.2"
          cd wordpress-plugin
          zip -r "../odwiedziny-chorych-v${VERSION}.zip" odwiedziny-chorych
          ls -la "../odwiedziny-chorych-v${VERSION}.zip"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.2.2
          name: Odwiedziny Chorych v1.2.2 (WordPress)
          body: |
            ### Wtyczka WordPress — paczka do wgrania

            Pobierz załącznik **`odwiedziny-chorych-v1.2.2.zip`**. W panelu WordPress: **Wtyczki → Dodaj nową → Wyślij wtyczkę na serwer**.

            Po instalacji przy wtyczce powinna być widoczna wersja **1.2.2**.

            **Instrukcja krok po kroku:** [INSTRUKCJA_WGRANIA_WORDPRESS.md](https://github.com/skoziolek/odwiedziny-chorych-js/blob/v1.2.2/wordpress-plugin/odwiedziny-chorych/INSTRUKCJA_WGRANIA_WORDPRESS.md)

            Pełny opis repozytorium: [STATUS_WDROZENIA.md](https://github.com/skoziolek/odwiedziny-chorych-js/blob/v1.2.2/STATUS_WDROZENIA.md)
          files: odwiedziny-chorych-v1.2.2.zip
          fail_on_unmatched_files: true
          generate_release_notes: false
