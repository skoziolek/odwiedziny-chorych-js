<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grafik odwiedzin chorych</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script type="module">
    import { generujKalendarz, drukujKalendarz, zapiszKalendarzDoPDF } from './kalendarz.js';
    import { aktualizujKolorWiersza, dodajWierszChorych, drukujListeChorych, zapiszListeChorychDoPDF } from './chorzy.js';
    import { dodajWierszSzafarzy, drukujListeSzafarzy, zapiszListeSzafarzyDoPDF } from './szafarze.js';

    // Udostępnienie funkcji globalnie
    window.aktualizujKolorWiersza = aktualizujKolorWiersza;
    window.dodajWierszChorych = dodajWierszChorych;
    window.dodajWierszSzafarzy = dodajWierszSzafarzy;
    window.drukujListeChorych = drukujListeChorych;
    window.zapiszListeChorychDoPDF = zapiszListeChorychDoPDF;
    window.drukujListeSzafarzy = drukujListeSzafarzy;
    window.zapiszListeSzafarzyDoPDF = zapiszListeSzafarzyDoPDF;
    window.drukujKalendarz = drukujKalendarz;
    window.zapiszKalendarzDoPDF = zapiszKalendarzDoPDF;

    // Inicjalizacja po załadowaniu strony
    document.addEventListener('DOMContentLoaded', () => {
      // Obsługa zakładek
      const buttons = document.querySelectorAll(".tab-button");
      const contents = document.querySelectorAll(".tab-content");
      
      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const tab = button.dataset.tab;
          buttons.forEach((btn) => btn.classList.remove("active"));
          contents.forEach((content) => content.classList.remove("active"));
          button.classList.add("active");
          document.getElementById(tab).classList.add("active");
        });
      });

      // Generowanie kalendarza
      generujKalendarz();
    });
  </script>
</head>
<body>
  <h1>Grafik odwiedzin chorych</h1>
  <div class="tabs">
    <button class="tab-button active" data-tab="kalendarz">📅 Kalendarz</button>
    <button class="tab-button" data-tab="chorzy">🧑‍⚕️ Dane chorych</button>
    <button class="tab-button" data-tab="szafarze">🙋‍♂️ Dane szafarzy</button>
  </div>

  <div id="kalendarz" class="tab-content active">
    <button onclick="drukujKalendarz()">Drukuj</button>
    <button onclick="zapiszKalendarzDoPDF()">Zapisz do PDF</button>
    <table id="tabelaKalendarz" border="1" style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr>
          <th scope="col">Data</th>
          <th scope="col">Nazwa</th>
          <th scope="col">Osoba Główna</th>
          <th scope="col">Pomocnik</th>
          <th scope="col">Uwagi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>  
  </div>

  <div id="chorzy" class="tab-content">
    <button onclick="drukujListeChorych()">Drukuj</button>
    <button onclick="zapiszListeChorychDoPDF()">Zapisz do PDF</button>
    <div id="tabelaChorzy">
      <table>
        <thead>
          <tr>
            <th>Lp.</th>
            <th>Imię i nazwisko</th>
            <th>Adres</th>
            <th>Numer telefonu</th>
            <th>Uwagi</th>
            <th>Aktualne</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td>
              <select onchange="aktualizujKolorWiersza(this)">
                <option value=""></option>
                <option value="TAK">TAK</option>
                <option value="NIE">NIE</option>
              </select>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <button class="add-row" onclick="dodajWierszChorych()">➕ Dodaj wiersz</button>
  </div>

  <div id="szafarze" class="tab-content">
    <button onclick="drukujListeSzafarzy()">Drukuj</button>
    <button onclick="zapiszListeSzafarzyDoPDF()">Zapisz do PDF</button>
    <table id="tabelaSzafarze">
      <thead>
        <tr>
          <th>Lp.</th>
          <th>Imię i nazwisko</th>
          <th>Adres zamieszkania</th>
          <th>Email</th>
          <th>Telefon</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
          <td contenteditable="true"></td>
        </tr>
      </tbody>
    </table>
    <div>
      <button class="add-row" onclick="dodajWierszSzafarzy()">➕ Dodaj wiersz</button>
    </div>
  </div>
</body>
</html>
